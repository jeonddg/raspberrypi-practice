<!DOCTYPE html>
<!-- HTML5 문서 선언 -->

<html>
  <head>
    <meta charset="UTF-8">
    <!-- 문자 인코딩 설정 (한글 깨짐 방지) -->

    <title>LED TEST</title>
    <!-- 브라우저 탭에 표시되는 제목 -->
  </head>

  <body>
    <h1>LED ON OFF</h1>
    <!-- 웹 페이지 상단 제목 -->

    <form action="/data" method="post">
      <!--
        사용자가 버튼을 클릭하면
        /data 주소로 POST 요청을 보내는 폼

        Flask 서버의 @app.route('/data', methods=['POST'])와 연결됨
      -->

      <input type="submit" name="led" value="on">
      <!--
        LED ON 버튼
        클릭 시 led=on 데이터가 서버로 전송됨
      -->

      <input type="submit" name="led" value="off">
      <!--
        LED OFF 버튼
        클릭 시 led=off 데이터가 서버로 전송됨
      -->

    </form>
  </body>
</html>
